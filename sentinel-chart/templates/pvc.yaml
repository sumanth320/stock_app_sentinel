apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "sentinel.fullname" . }}-chroma
spec:
  accessModes:
    - ReadWriteOnce # One pod can write to this at a time
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "5Gi" }}
  # If you leave storageClassName empty, it uses the cluster default (local-path for Rancher)
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}