services:
  sentinel:
    build: .
    image: stock-app-sentinel:latest
    env_file: .env
    stdin_open: true
    tty: true
    volumes:
      - ./chroma_data:/app/chroma_data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: